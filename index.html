<!DOCTYPE html>
<html>
		<head>
		<title>Job Form</title>
		</head>
		<link rel="stylesheet" href="../CSS/JobFom.css"/>
		<body>
		<div class="container">
			<div class="apply-box">
			<h1>Job Application <span class="web"> (Web)</span></h1><br>
			<form>
				<div class="form-container">
					<div class="form-control">
						<label for="first-name">First Name</label>
						<input id="first-name" name="first-name" placeholder="Enter First Name">
					
						<label for="last-name">Last Name</label>
						<input id="last-name" name="last-name" placeholder="Enter last Name"><br/><br>
						
						<label for="email">Email</label>
						<input id="email" name="email" placeholder="Enter Your Email " type="email">
						
						<label> Job Role</label>
						<select id="job-role"  name="job-role">
							<option value="">Select Job Role</option>
							<option value="frontend">Frontend Developer</option>
							<option value="backend">Backend Developer</option>
							<option value="fullstack">Full Stack Developer</option>
							<option value="ui-ux">UI UX Designer</option>
							
						
						
						
						</select><br><br>
						
						<label>Address</label><br>
					<textarea id="address" name="address" rows="4" cols="50" placeholder="Enter Your Address" ></textarea>
					<br><br>
						<label for="city">City</label>
						<input id="city" name="city" placeholder="Enter City">
						
						<label>Pincode</label>
						<input type="number" id="pincode" name="pincode" placeholder="Enter Pincode"><br><br>
						
						<label for="">Start Date</label>
						<input value="10-04-2026" type="date" id="date" name="date" placeholder="Enter Date">
						
						<label for="">Upload File</label>
						<input type="file" id="pincode" name="pincode" placeholder="Upload File">
					</div>



				</div>
			
			
			
			</form>
			</div>
		
		
		
		
		</div>

		
		





		</body>
</html>
